<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>TGW客服部</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-main: #FFFAFB;
      --bg-sidebar: #FFE4EC;
      --bg-input: #FFFFFF;
      --accent-pink: #FF8FAB;
      --accent-pink-light: #FFB6C8;
      --accent-blue: #B5E8FF;
      --accent-purple: #E8D5F2;
      --text-primary: #5D4E60;
      --text-secondary: #8B7B8E;
      --text-dark: #4A3F4F;
      --shadow-soft: rgba(255, 143, 171, 0.15);
      --shadow-pink: rgba(255, 182, 200, 0.3);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    body {
      font-family: 'Quicksand', 'Noto Sans SC', -apple-system, sans-serif;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      background: #E8F4FD;
      color: var(--text-primary);
      user-select: none;
      -webkit-user-select: none;
    }

    /* ========== Background ========== */
    .bg-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: #E8F4FD;
      background-image: url('/static/bg.jpg');
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      opacity: 0.85;
      z-index: 0;
      pointer-events: none;
    }

    /* ========== Overlay (sidebar / settings backdrop) ========== */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.35);
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    /* ========== Top Bar ========== */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 182, 200, 0.35);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      z-index: 10;
    }

    .topbar-title {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dark);
      letter-spacing: 1px;
    }

    .topbar-btn {
      width: 40px;
      height: 40px;
      background: rgba(255, 143, 171, 0.1);
      border: 1.5px solid rgba(255, 182, 200, 0.3);
      border-radius: 50%;
      color: var(--accent-pink);
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s ease;
      flex-shrink: 0;
    }

    .topbar-btn:active {
      background: rgba(255, 143, 171, 0.25);
      transform: scale(0.93);
    }

    /* ========== Sidebar Drawer ========== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      max-width: 82vw;
      background: linear-gradient(180deg, rgba(255, 228, 236, 0.95) 0%, rgba(255, 214, 228, 0.95) 100%);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 60;
      display: flex;
      flex-direction: column;
      transform: translateX(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-right: 2px solid rgba(255, 255, 255, 0.6);
      box-shadow: 4px 0 30px var(--shadow-soft);
    }

    .sidebar.open {
      transform: translateX(0);
    }

    .sidebar-header {
      padding: 60px 16px 16px;
    }

    .new-chat-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent-pink) 0%, #FF6B8A 100%);
      color: white;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
      font-family: inherit;
      box-shadow: 0 4px 15px var(--shadow-pink);
      transition: all 0.25s ease;
    }

    .new-chat-btn:active {
      transform: scale(0.97);
      opacity: 0.85;
    }

    .conversation-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      -webkit-overflow-scrolling: touch;
    }

    .conversation-item {
      padding: 14px 16px;
      border-radius: 14px;
      cursor: pointer;
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      transition: all 0.2s ease;
    }

    .conversation-item:active {
      background: rgba(255, 255, 255, 0.85);
      transform: scale(0.98);
    }

    .conversation-item.active {
      background: white;
      box-shadow: 0 4px 16px var(--shadow-soft);
      border-color: var(--accent-pink-light);
    }

    .conversation-item span {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 500;
      font-size: 14px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--accent-pink);
      cursor: pointer;
      padding: 6px 12px;
      border-radius: 50%;
      font-size: 20px;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .delete-btn:active {
      background: rgba(255, 143, 171, 0.25);
    }

    /* ========== Main Content ========== */
    .main {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      z-index: 1;
    }

    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      -webkit-overflow-scrolling: touch;
    }

    /* ========== Welcome Screen ========== */
    .welcome {
      text-align: center;
      padding: 60px 20px 20px;
      color: var(--text-secondary);
      position: relative;
    }

    .welcome h1 {
      font-size: 24px;
      margin-bottom: 10px;
      color: #1a3a5c;
      font-weight: 600;
    }

    .welcome p {
      font-size: 15px;
      color: #ffffff;
      font-weight: 400;
    }

    /* ========== Messages ========== */
    .message {
      margin-bottom: 16px;
      max-width: 88%;
      animation: messageIn 0.35s ease-out;
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      margin-left: auto;
    }

    .message.assistant {
      margin-right: auto;
    }

    .message-header {
      display: flex;
      align-items: center;
      margin-bottom: 6px;
      padding: 0 4px;
    }

    .message-role {
      font-weight: 600;
      font-size: 12px;
      letter-spacing: 0.5px;
    }

    .message.user .message-role {
      color: #7BAFD4;
    }

    .message.user .message-role::before {
      content: '♡ ';
    }

    .message.assistant .message-role {
      color: var(--accent-pink);
    }

    .message.assistant .message-role::before {
      content: '♪ ';
    }

    .message-content {
      padding: 14px 16px;
      border-radius: 18px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      position: relative;
    }

    .message.user .message-content {
      background: linear-gradient(135deg, var(--accent-blue) 0%, #D4EEFF 100%);
      color: var(--text-dark);
      border-bottom-right-radius: 6px;
      box-shadow: 0 3px 12px rgba(181, 232, 255, 0.4);
    }

    .message.assistant .message-content {
      background: linear-gradient(135deg, #FFE4EC 0%, #FFD9E8 100%);
      color: var(--text-dark);
      border-bottom-left-radius: 6px;
      box-shadow: 0 3px 12px var(--shadow-soft);
    }

    .message.user .message-content::after {
      content: '';
      position: absolute;
      right: -7px;
      top: 10px;
      width: 0;
      height: 0;
      border-left: 10px solid #D4EEFF;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
    }

    .message.assistant .message-content::after {
      content: '';
      position: absolute;
      left: -7px;
      top: 10px;
      width: 0;
      height: 0;
      border-right: 10px solid #FFD9E8;
      border-top: 7px solid transparent;
      border-bottom: 7px solid transparent;
    }

    /* ========== Loading ========== */
    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-secondary);
      padding: 16px;
      font-size: 13px;
    }

    .loading-dots {
      display: flex;
      gap: 5px;
    }

    .loading-dots span {
      width: 9px;
      height: 9px;
      background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-pink-light) 100%);
      border-radius: 50%;
      animation: heartBounce 1.4s infinite ease-in-out;
      box-shadow: 0 2px 6px var(--shadow-pink);
    }

    .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
    .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes heartBounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40%            { transform: scale(1.15); opacity: 1; }
    }

    /* ========== Input Area ========== */
    .input-area {
      padding: 12px 14px;
      padding-bottom: calc(12px + var(--safe-bottom));
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 182, 200, 0.3);
      position: relative;
    }

    .input-area::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2.5px;
      background: linear-gradient(90deg, var(--accent-pink-light), var(--accent-purple), var(--accent-blue));
      opacity: 0.6;
    }

    .input-container {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    #messageInput {
      flex: 1;
      padding: 12px 16px;
      background: white;
      border: 2px solid rgba(255, 182, 200, 0.3);
      border-radius: 22px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      resize: none;
      min-height: 46px;
      max-height: 120px;
      transition: all 0.25s ease;
      box-shadow: 0 2px 10px rgba(255, 143, 171, 0.06);
    }

    #messageInput:focus {
      outline: none;
      border-color: var(--accent-pink);
      box-shadow: 0 3px 16px var(--shadow-soft);
    }

    #messageInput::placeholder {
      color: var(--text-secondary);
    }

    .send-btn {
      width: 46px;
      height: 46px;
      min-width: 46px;
      background: linear-gradient(135deg, var(--accent-pink) 0%, #FF6B8A 100%);
      color: white;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      font-family: inherit;
      box-shadow: 0 4px 14px var(--shadow-pink);
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:active {
      transform: scale(0.92);
      opacity: 0.85;
    }

    .send-btn:disabled {
      opacity: 0.45;
    }

    /* ========== Settings Panel ========== */
    .settings-panel {
      position: fixed;
      top: 0;
      right: -100%;
      width: 100%;
      max-width: 340px;
      height: 100%;
      height: 100dvh;
      background: linear-gradient(180deg, rgba(255, 245, 248, 0.95) 0%, rgba(255, 255, 255, 0.95) 100%);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border-left: 2px solid rgba(255, 182, 200, 0.4);
      padding: 24px 20px;
      transition: right 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 60;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      box-shadow: -4px 0 30px var(--shadow-soft);
    }

    .settings-panel.open {
      right: 0;
    }

    .settings-panel h3 {
      margin-bottom: 24px;
      color: var(--text-dark);
      font-size: 18px;
      font-weight: 600;
      padding-bottom: 14px;
      border-bottom: 2px solid rgba(255, 182, 200, 0.3);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .settings-panel h3::before {
      content: '✧';
      color: var(--accent-pink);
    }

    .close-settings {
      position: absolute;
      top: 18px;
      right: 18px;
      background: rgba(255, 143, 171, 0.1);
      border: none;
      color: var(--accent-pink);
      cursor: pointer;
      font-size: 22px;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .close-settings:active {
      background: var(--accent-pink);
      color: white;
    }

    .setting-group {
      margin-bottom: 22px;
    }

    .setting-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
    }

    .setting-group input[type="range"] {
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--accent-pink-light), var(--accent-purple));
      -webkit-appearance: none;
      appearance: none;
      cursor: pointer;
    }

    .setting-group input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      background: white;
      border: 3px solid var(--accent-pink);
      border-radius: 50%;
      box-shadow: 0 2px 8px var(--shadow-pink);
    }

    .setting-group input[type="range"]::-webkit-slider-thumb:active {
      transform: scale(1.12);
    }

    .setting-group .value {
      text-align: right;
      color: var(--accent-pink);
      font-size: 13px;
      font-weight: 600;
      margin-top: 6px;
    }

    /* ========== Scrollbar ========== */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(255, 182, 200, 0.08);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--accent-pink-light), var(--accent-pink));
      border-radius: 2px;
    }

    ::selection {
      background: rgba(255, 143, 171, 0.3);
      color: var(--text-dark);
    }
  </style>
</head>
<body>
  <div class="bg-layer"></div>

  <!-- Overlay for drawers -->
  <div class="overlay" id="overlay"></div>

  <!-- Top Bar -->
  <div class="topbar">
    <button class="topbar-btn" id="menuBtn" aria-label="菜单">☰</button>
    <span class="topbar-title">TGW客服部</span>
    <button class="topbar-btn" id="settingsBtn" aria-label="设置">⚙</button>
  </div>

  <!-- Sidebar Drawer -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="new-chat-btn" id="newChatBtn">+ 新对话</button>
    </div>
    <div class="conversation-list" id="conversationList"></div>
  </div>

  <!-- Main Content -->
  <div class="main">
    <div class="chat-area" id="chatArea">
      <div class="welcome">
        <h1>TGW客服部</h1>
        <p>正在为您转接0214号客服……</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-container">
        <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn" aria-label="发送">➤</button>
      </div>
    </div>
  </div>

  <!-- Settings Panel -->
  <div class="settings-panel" id="settingsPanel">
    <button class="close-settings" id="closeSettings">×</button>
    <h3>生成参数</h3>

    <div class="setting-group">
      <label>Temperature</label>
      <input type="range" id="temperature" min="0" max="2" step="0.1" value="1">
      <div class="value" id="temperatureValue">1</div>
    </div>

    <div class="setting-group">
      <label>Top P</label>
      <input type="range" id="topP" min="0" max="1" step="0.05" value="0.7">
      <div class="value" id="topPValue">0.7</div>
    </div>

    <div class="setting-group">
      <label>Max Tokens</label>
      <input type="range" id="maxTokens" min="64" max="4096" step="64" value="2048">
      <div class="value" id="maxTokensValue">2048</div>
    </div>

    <div class="setting-group">
      <label>Presence Penalty</label>
      <input type="range" id="presencePenalty" min="-2" max="2" step="0.1" value="0">
      <div class="value" id="presencePenaltyValue">0</div>
    </div>

    <div class="setting-group">
      <label>Frequency Penalty</label>
      <input type="range" id="frequencyPenalty" min="-2" max="2" step="0.1" value="0">
      <div class="value" id="frequencyPenaltyValue">0</div>
    </div>
  </div>

  <script>
    if (window.innerWidth >= 768) {
      location.replace('/');
    }
  </script>
  <script>
    const API_BASE = '/api';

    let conversations = [];
    let currentConversationId = null;
    let isGenerating = false;
    let abortController = null;

    const settings = {
      temperature: 1.0,
      top_p: 0.7,
      max_tokens: 2048,
      presence_penalty: 0,
      frequency_penalty: 0
    };

    // --- DOM refs ---
    const conversationList = document.getElementById('conversationList');
    const chatArea = document.getElementById('chatArea');
    const messageInput = document.getElementById('messageInput');
    const sendBtn = document.getElementById('sendBtn');
    const sidebar = document.getElementById('sidebar');
    const settingsPanel = document.getElementById('settingsPanel');
    const overlay = document.getElementById('overlay');

    // --- Drawer helpers ---
    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('show');
    }

    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('show');
    }

    function openSettings() {
      settingsPanel.classList.add('open');
      overlay.classList.add('show');
    }

    function closeSettings() {
      settingsPanel.classList.remove('open');
      overlay.classList.remove('show');
    }

    function closeAllDrawers() {
      closeSidebar();
      closeSettings();
    }

    // --- Init ---
    async function init() {
      await loadConversations();
      setupEventListeners();
      setupSettings();
    }

    async function loadConversations() {
      try {
        const res = await fetch(`${API_BASE}/conversations`);
        conversations = await res.json();
        renderConversationList();
      } catch (err) {
        console.error('Failed to load conversations:', err);
      }
    }

    function renderConversationList() {
      conversationList.innerHTML = conversations.map(conv => `
        <div class="conversation-item ${conv.id === currentConversationId ? 'active' : ''}"
             data-id="${conv.id}">
          <span>${escapeHtml(conv.title)}</span>
          <button class="delete-btn" data-id="${conv.id}">×</button>
        </div>
      `).join('');
    }

    function setupEventListeners() {
      // Menu button
      document.getElementById('menuBtn').addEventListener('click', openSidebar);

      // Overlay tap to close drawers
      overlay.addEventListener('click', closeAllDrawers);

      // New chat
      document.getElementById('newChatBtn').addEventListener('click', async () => {
        closeSidebar();
        try {
          const res = await fetch(`${API_BASE}/conversations`, { method: 'POST' });
          const conv = await res.json();
          conversations.unshift(conv);
          renderConversationList();
          selectConversation(conv.id);
        } catch (err) {
          console.error('Failed to create conversation:', err);
        }
      });

      // Select / delete conversation
      conversationList.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-btn')) {
          e.stopPropagation();
          deleteConversation(e.target.dataset.id);
        } else {
          const item = e.target.closest('.conversation-item');
          if (item) {
            closeSidebar();
            selectConversation(item.dataset.id);
          }
        }
      });

      // Send
      sendBtn.addEventListener('click', sendMessage);
      messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      // Auto-resize textarea
      messageInput.addEventListener('input', () => {
        messageInput.style.height = 'auto';
        messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + 'px';
      });

      // Settings
      document.getElementById('settingsBtn').addEventListener('click', openSettings);
      document.getElementById('closeSettings').addEventListener('click', closeSettings);
    }

    function setupSettings() {
      const settingInputs = [
        { id: 'temperature', key: 'temperature' },
        { id: 'topP', key: 'top_p' },
        { id: 'maxTokens', key: 'max_tokens' },
        { id: 'presencePenalty', key: 'presence_penalty' },
        { id: 'frequencyPenalty', key: 'frequency_penalty' }
      ];

      settingInputs.forEach(({ id, key }) => {
        const input = document.getElementById(id);
        const valueEl = document.getElementById(id + 'Value');

        input.addEventListener('input', () => {
          settings[key] = parseFloat(input.value);
          valueEl.textContent = input.value;
        });

        input.value = settings[key];
        valueEl.textContent = settings[key];
      });
    }

    async function selectConversation(id) {
      currentConversationId = id;
      renderConversationList();

      try {
        const res = await fetch(`${API_BASE}/conversations/${id}`);
        const conv = await res.json();
        renderMessages(conv.messages);
      } catch (err) {
        console.error('Failed to load conversation:', err);
      }
    }

    function renderMessages(messages) {
      if (messages.length === 0) {
        chatArea.innerHTML = `
          <div class="message assistant">
            <div class="message-header">
              <span class="message-role">客服小祥</span>
            </div>
            <div class="message-content">您好，这里是TGW客服中心，我是0214号客服丰川祥子，请问有什么可以帮您？</div>
          </div>
        `;
        return;
      }

      const displayMessages = messages.filter(m => m.role !== 'system');

      chatArea.innerHTML = displayMessages.map(msg => `
        <div class="message ${msg.role}">
          <div class="message-header">
            <span class="message-role">${msg.role === 'user' ? '我' : '客服小祥'}</span>
          </div>
          <div class="message-content">${escapeHtml(msg.content)}</div>
        </div>
      `).join('');

      scrollToBottom();
    }

    async function sendMessage() {
      if (isGenerating) return;

      const content = messageInput.value.trim();
      if (!content) return;

      if (!currentConversationId) {
        try {
          const res = await fetch(`${API_BASE}/conversations`, { method: 'POST' });
          const conv = await res.json();
          conversations.unshift(conv);
          currentConversationId = conv.id;
          renderConversationList();
        } catch (err) {
          console.error('Failed to create conversation:', err);
          return;
        }
      }

      appendMessage({ role: 'user', content });
      messageInput.value = '';
      messageInput.style.height = 'auto';
      isGenerating = true;
      sendBtn.disabled = true;

      const loadingEl = document.createElement('div');
      loadingEl.className = 'message assistant';
      loadingEl.innerHTML = `
        <div class="message-header">
          <span class="message-role">客服小祥</span>
        </div>
        <div class="loading">
          <div class="loading-dots">
            <span></span><span></span><span></span>
          </div>
          正在思考...
        </div>
      `;
      chatArea.appendChild(loadingEl);
      scrollToBottom();

      try {
        abortController = new AbortController();

        const res = await fetch(`${API_BASE}/chat`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            conversation_id: currentConversationId,
            message: content,
            ...settings
          }),
          signal: abortController.signal
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let assistantContent = '';

        loadingEl.remove();

        const assistantMsg = document.createElement('div');
        assistantMsg.className = 'message assistant';
        assistantMsg.innerHTML = `
          <div class="message-header">
            <span class="message-role">客服小祥</span>
          </div>
          <div class="message-content"></div>
        `;
        chatArea.appendChild(assistantMsg);
        const contentEl = assistantMsg.querySelector('.message-content');

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');

          for (const line of lines) {
            if (line.startsWith('data: ')) {
              const data = line.slice(6);
              if (data === '[DONE]') continue;

              try {
                const parsed = JSON.parse(data);
                const delta = parsed.choices?.[0]?.delta?.content;
                if (delta) {
                  assistantContent += delta;
                  contentEl.textContent = assistantContent;
                  scrollToBottom();
                }
              } catch (e) {}
            }
          }
        }

        await loadConversations();
        renderConversationList();

      } catch (err) {
        if (err.name !== 'AbortError') {
          console.error('Chat error:', err);
          const loading = loadingEl.querySelector('.loading');
          if (loading) loading.textContent = '发送失败，请重试';
        }
      } finally {
        isGenerating = false;
        sendBtn.disabled = false;
        abortController = null;
      }
    }

    async function deleteConversation(id) {
      if (!confirm('确定要删除这段对话吗？')) return;

      try {
        await fetch(`${API_BASE}/conversations/${id}`, { method: 'DELETE' });
        conversations = conversations.filter(c => c.id !== id);
        renderConversationList();

        if (currentConversationId === id) {
          currentConversationId = conversations[0]?.id || null;
          if (currentConversationId) {
            selectConversation(currentConversationId);
          } else {
            chatArea.innerHTML = `
              <div class="welcome">
                <h1>TGW客服部</h1>
                <p>正在为您转接0214号客服……</p>
              </div>
            `;
          }
        }
      } catch (err) {
        console.error('Failed to delete conversation:', err);
      }
    }

    function appendMessage(msg) {
      const msgEl = document.createElement('div');
      msgEl.className = `message ${msg.role}`;
      msgEl.innerHTML = `
        <div class="message-header">
          <span class="message-role">${msg.role === 'user' ? '我' : '客服小祥'}</span>
        </div>
        <div class="message-content">${escapeHtml(msg.content)}</div>
      `;
      chatArea.appendChild(msgEl);
      scrollToBottom();
    }

    function scrollToBottom() {
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    init();
  </script>
</body>
</html>
